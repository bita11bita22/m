worker_processes auto;
pid /tmp/nginx.pid;
error_log /tmp/nginx_error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format traffic '$remote_addr $body_bytes_sent';
    access_log /tmp/nginx_access.log traffic;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 120;
    
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;

    upstream panel_backend { server 127.0.0.1:5000; }
    upstream xray_ws { server 127.0.0.1:18080; }
    upstream xray_xh { server 127.0.0.1:18081; }
    upstream xray_grpc { server 127.0.0.1:18083; }
    upstream xray_hu { server 127.0.0.1:18084; }
    upstream xray_tj { server 127.0.0.1:18085; }
    upstream xray_vm { server 127.0.0.1:18086; }
    upstream xray_warp { server 127.0.0.1:18087; }

    server {
        listen PORT_PLACEHOLDER;
        server_name _;

        location /xh {
            proxy_pass http://xray_xh;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
        }

        location /ws {
            proxy_pass http://xray_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /grpc {
            if ($content_type !~ "application/grpc") { return 404; }
            grpc_read_timeout 1h;
            grpc_send_timeout 1h;
            client_max_body_size 0;
            client_body_buffer_size 512k;
            proxy_buffering off;
            proxy_http_version 1.1;
            grpc_pass grpc://xray_grpc;
        }

        location /hu {
            proxy_pass http://xray_hu;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /tj {
            proxy_pass http://xray_tj;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /vm {
            proxy_pass http://xray_vm;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /warp {
            proxy_pass http://xray_warp;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://panel_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }
    }
}