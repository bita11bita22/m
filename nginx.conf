worker_processes auto;
pid /tmp/nginx.pid;
error_log /tmp/nginx_error.log warn;
events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format traffic '$body_bytes_sent';
    access_log /tmp/nginx_access.log traffic;
    
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    upstream panel_backend { server 127.0.0.1:5000; }
    upstream xray_ws { server 127.0.0.1:18080; }
    upstream xray_xh { server 127.0.0.1:18081; }
    upstream xray_grpc { server 127.0.0.1:18083; }
    upstream xray_hu { server 127.0.0.1:18084; }

    server {
        listen PORT_PLACEHOLDER;
        server_name _;

        location /nginx_status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }

        # پروکسی XHTTP
        location /xh {
            proxy_pass http://xray_xh;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
        }

        # پروکسی WebSocket
        location /ws {
            proxy_pass http://xray_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # پروکسی gRPC (ترانسپورت جدید)
        location /grpc {
            if ($content_type !~ "application/grpc") { return 404; }
            grpc_read_timeout 1h;
            grpc_send_timeout 1h;
            client_max_body_size 0;
            client_body_buffer_size 512k;
            proxy_buffering off;
            proxy_http_version 1.1;
            grpc_pass grpc://xray_grpc;
        }

        # پروکسی HTTPUpgrade (ترانسپورت جدید)
        location /hu {
            proxy_pass http://xray_hu;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # پنل مدیریت و API
        location / {
            proxy_pass http://panel_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }
    }
}